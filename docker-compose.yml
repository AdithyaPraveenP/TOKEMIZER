services:
  router:
    build: .
    container_name: router
    env_file:
      - .env
    volumes:
      - ./test_input:/input
      - ./test_output:/output
      # Live Volume Bridge: Mirrors local Python changes instantly into the container
      - ./router/src:/app/src
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
